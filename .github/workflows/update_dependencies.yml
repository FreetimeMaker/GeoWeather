name: Dependabot Replacement (Gradle + GitHub Actions)

on:
  schedule:
    - cron: "0 * * * *"   # hourly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ---------------------------------------------------
      # 1) GRADLE DEPENDENCY UPDATES (ben-manes plugin)
      # ---------------------------------------------------
      - name: Run Gradle Dependency Updates
        run: ./gradlew dependencyUpdates

      - name: Parse Gradle Updates
        id: gradle_updates
        run: |
          REPORT="build/dependencyUpdates/report.json"
          if [ ! -f "$REPORT" ]; then
            echo "no_updates=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract updates as: group:name:newVersion
          jq -r '.outdated.dependencies[] | "\(.group):\(.name):\(.available.release)"' "$REPORT" > gradle_updates.txt
          echo "no_updates=false" >> $GITHUB_OUTPUT

      - name: Create PRs for Gradle Updates
        if: steps.gradle_updates.outputs.no_updates == 'false'
        run: |
          while IFS=: read -r GROUP NAME VERSION; do
            PACKAGE="${GROUP}.${NAME}"
            BRANCH="dependabot/gradle/${PACKAGE}-${VERSION}"

            git checkout -b "$BRANCH"

            # Apply update
            sed -i "s|\(${GROUP}:${NAME}:\)[^\"']*|\1${VERSION}|g" **/*.gradle.kts

            git commit -am "chore(deps): bump ${PACKAGE} to ${VERSION}"
            git push origin "$BRANCH"

            gh pr create \
              --title "chore(deps): bump ${PACKAGE} to ${VERSION}" \
              --body "Automated update via Dependabot replacement." \
              --label dependencies \
              --head "$BRANCH"

            git checkout master
          done < gradle_updates.txt

      # ---------------------------------------------------
      # 2) GITHUB ACTIONS VERSION UPDATES
      # ---------------------------------------------------
      - name: Update GitHub Actions Versions
        id: gha_updates
        uses: tibdex/github-actions-automatic-updater@v1

      - name: Create PR for GitHub Actions Updates
        if: steps.gha_updates.outputs.pull_request_url == ''
        run: |
          UPDATED=$(git diff --name-only)
          if [ -z "$UPDATED" ]; then
            echo "No GitHub Actions updates."
            exit 0
          fi

          # Extract action name + version
          ACTION=$(echo "$UPDATED" | head -n 1)
          VERSION=$(grep -oP '@v\K[0-9.]+' "$ACTION")

          BRANCH="dependabot/github_actions/${ACTION//\//-}-${VERSION}"

          git checkout -b "$BRANCH"
          git commit -am "chore(deps): bump ${ACTION} to ${VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore(deps): bump ${ACTION} to ${VERSION}" \
            --body "Automated update via Dependabot replacement." \
            --label dependencies \
            --head "$BRANCH"
