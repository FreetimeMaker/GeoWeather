name: Renovate (Updates Gradle & GitHub Actions)

on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 * * * *"   # Hourly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v40
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
