name: Build, Sign and Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # wichtig für Tags

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make script executable
        run: chmod +x ./build_and_sign_workflow.sh

      - name: Build & Sign APK
        run: ./build_and_sign_workflow.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "GeoWeather ${{ github.ref_name }}"
          body: "Automatisch gebaut und signiert."
          draft: false
          prerelease: false
          files: "GeoWeather-${{ github.ref_name }}.apk"
