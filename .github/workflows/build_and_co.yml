name: Build, Sign and Release Android App and Web Page

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  prepare_android_app:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.versioncheck.outputs.version }}
      create_tag: ${{ steps.versioncheck.outputs.create_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version & create tag
        id: versioncheck
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed -E 's/.*versionName[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          git fetch --tags
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
          else
            git tag "v$VERSION"
            git push origin "v$VERSION"
            echo "create_tag=true" >> "$GITHUB_OUTPUT"
          fi

  build_sign_and_release_android_app:
    needs: prepare_android_app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Sign Android
        run: |
          chmod +x ./build_and_sign_workflow.sh
          ./build_and_sign_workflow.sh
        env:
          GITHUB_REF_NAME: v${{ needs.prepare.outputs.version }}

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeoWeather-master.apk
          path: GeoWeather-master.apk
          if-no-files-found: error
          retention-days: 90

      - name: Upload APK to Release
        if: needs.prepare.outputs.create_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          files: |
            GeoWeather-master.apk
          draft: true
          generate_release_notes: true

 # ---------------------------------------------------------
 # 2) Jekyll Build
 # ---------------------------------------------------------
   build_web_page:
     name: "Build Jekyll site"
     runs-on: ubuntu-latest
     needs: build_sign_and_release_android_app
  
     steps:
       - name: Checkout
         uses: actions/checkout@v4
  
       - name: Setup Pages
         uses: actions/configure-pages@v5
  
       - name: Build with Jekyll
         uses: actions/jekyll-build-pages@v1
         with:
           source: ./web
           destination: ./_site
  
       - name: Upload artifact
         uses: actions/upload-pages-artifact@v3
  
   # ---------------------------------------------------------
   # 3) Deployment
   # ---------------------------------------------------------
   deploy_web_page:
     name: "Deploy to GitHub Pages"
     runs-on: ubuntu-latest
     needs: build_web_page
     environment:
       name: github-pages
       url: ${{ steps.deployment.outputs.page_url }}
  
     steps:
       - name: Deploy to GitHub Pages
         id: deployment
         uses: actions/deploy-pages@v4