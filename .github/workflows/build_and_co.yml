name: Android Build, Sign and Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.versioncheck.outputs.version }}
      create_tag: ${{ steps.versioncheck.outputs.create_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version & create tag
        id: versioncheck
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed -E 's/.*versionName[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          git fetch --tags
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
          else
            git tag "v$VERSION"
            git push origin "v$VERSION"
            echo "create_tag=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Sign Android
        run: |
          chmod +x ./build_and_sign_workflow.sh
          ./build_and_sign_workflow.sh
        env:
          GITHUB_REF_NAME: v${{ needs.prepare.outputs.version }}

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeoWeather-master.apk
          path: GeoWeather-master.apk
          if-no-files-found: error
          retention-days: 90

      - name: Upload APK to Release
        if: needs.prepare.outputs.create_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          files: |
            GeoWeather-master.apk
          draft: false
          generate_release_notes: true
