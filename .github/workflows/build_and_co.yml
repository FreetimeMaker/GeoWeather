name: Multiplatform Build and Release

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.versioncheck.outputs.version }}
      create_tag: ${{ steps.versioncheck.outputs.create_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version & create tag
        id: versioncheck
        run: |
          VERSION=$(grep 'versionName' composeApp/build.gradle.kts | sed -E 's/.*versionName[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          git fetch --tags
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
          else
            git tag "v$VERSION"
            git push origin "v$VERSION"
            echo "create_tag=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    if: needs.prepare.outputs.create_tag == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            tasks: ":composeApp:assembleRelease :composeApp:packageReleaseDeb :composeApp:packageReleaseRpm :composeApp:wasmJsBrowserDistribution"
            artifacts: "composeApp/build/compose/binaries/main/deb/*.deb composeApp/build/compose/binaries/main/rpm/*.rpm"
          - os: windows-latest
            tasks: ":composeApp:packageReleaseMsi :composeApp:packageReleaseExe"
            artifacts: "composeApp/build/compose/binaries/main/msi/*.msi composeApp/build/compose/binaries/main/exe/*.exe"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build with Gradle
        run: ./gradlew ${{ matrix.tasks }}

      - name: Sign Android & WASM Zip (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x ./build_and_sign_workflow.sh
          ./build_and_sign_workflow.sh
          cd composeApp/build/dist/wasmJs/productionExecutable
          zip -r ../../../../GeoWeather-v${{ needs.prepare.outputs.version }}-wasm.zip .
        env:
          GITHUB_REF_NAME: v${{ needs.prepare.outputs.version }}

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          files: |
            ${{ matrix.artifacts }}
            GeoWeather-*.apk
            GeoWeather-*-wasm.zip
          draft: true
          generate_release_notes: true